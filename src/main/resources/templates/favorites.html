<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites — SpecScout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#faf8f5; --card:#fff; --ink:#2b2622; --muted:#8a8178; --line:#ece7e0; --gold:#b78a3d; --soft:#f4efe8; }
        *{box-sizing:border-box;}
        body{font-family:'Inter',Arial,sans-serif; background:var(--bg); margin:0; color:var(--ink);}
        a{text-decoration:none; color:inherit;}
        .navbar{display:flex; align-items:center; gap:24px; background:rgba(255,255,255,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:16px 32px; position:sticky; top:0; z-index:20;}
        .brand{font-family:'Playfair Display',serif; font-size:24px; font-weight:700; display:flex; align-items:center; gap:9px;}
        .brand .dot{width:9px; height:9px; border-radius:50%; background:var(--gold);}
        .nav-links{display:flex; gap:22px; font-size:14px;}
        .nav-links a{color:var(--muted);} .nav-links a:hover{color:var(--ink);}
        .wrap{max-width:1160px; margin:0 auto; padding:52px 32px;}
        h1{font-family:'Playfair Display',serif; font-size:36px; margin:0 0 6px;}
        .sub{color:var(--muted); font-size:14px; margin:0 0 28px;}
        .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:26px;}
        .card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:24px; display:block; transition:transform .18s ease, box-shadow .18s ease;}
        .card:hover{transform:translateY(-6px); box-shadow:0 18px 40px rgba(120,100,60,.12);}
        .phone-img{height:200px; background:linear-gradient(160deg,#fbf9f6,#f4efe8); border:1px solid var(--line); border-radius:16px; display:flex; align-items:center; justify-content:center; margin-bottom:18px; font-size:46px;}
        .phone-img img{max-height:180px; max-width:90%;}
        .brand-tag{color:var(--gold); font-size:12px; font-weight:600; letter-spacing:.6px; text-transform:uppercase;}
        .name{font-size:20px; font-weight:600; margin:2px 0 0;}
        .specs{margin-top:14px; display:flex; flex-wrap:wrap; gap:8px;}
        .spec{background:var(--soft); color:#5a5249; font-size:12px; padding:6px 12px; border-radius:9px;}
        .empty{color:var(--muted); background:#fff; border:1px dashed var(--line); border-radius:16px; padding:40px; text-align:center;}
        .empty a{color:var(--gold);}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand"><span class="dot"></span>SpecScout</a>
        <div class="nav-links">
            <a href="/">Browse</a>
            <a href="/favorites">Favorites</a>
        </div>
    </nav>
    <div class="wrap">
        <h1>Your favourites</h1>
        <p class="sub">The phones you've saved to revisit.</p>

        <div class="grid" th:if="${!phones.isEmpty()}">
            <a class="card" th:each="phone : ${phones}" th:href="@{/phone/{id}(id=${phone.id})}">
                <div class="phone-img">
                    <img th:if="${phone.image != null and phone.image != ''}"
                         th:src="'data:image/jpeg;base64,' + ${phone.image}"/>
                    <span th:unless="${phone.image != null and phone.image != ''}">📱</span>
                </div>
                <div class="brand-tag" th:text="${phone.brand}">Brand</div>
                <p class="name" th:text="${phone.name}">Phone name</p>
                <div class="specs">
                    <span class="spec" th:if="${phone.ram != null and phone.ram != ''}" th:text="${phone.ram}">RAM</span>
                    <span class="spec" th:if="${phone.battery != null and phone.battery != ''}" th:text="${phone.battery}">Battery</span>
                </div>
            </a>
        </div>

        <div class="empty" th:if="${phones.isEmpty()}">
            No favourites yet. Tap the ♡ on any phone to save it here. <a href="/">Browse phones →</a>
        </div>
    </div>
</body>
</html>
